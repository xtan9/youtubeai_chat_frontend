name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: 10 }
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: 10 }
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: 10 }
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: 10 }
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # Upgrade-path regression guard: replays prod's pre-migration shape and
  # then applies every migration in order. Catches the class of failure
  # where a migration works on a fresh DB (Vitest tests) but breaks on a
  # pre-existing one (what bit us on db-migrate run 24593654019).
  migration-upgrade-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v5
      - name: Load Supabase role + auth stubs
        run: psql -v ON_ERROR_STOP=1 -f supabase/test-fixtures/supabase_stubs.sql
      - name: Load legacy-schema fixture (pre-migration state)
        run: psql -v ON_ERROR_STOP=1 -f supabase/test-fixtures/legacy_schema.sql
      - name: Apply migrations in order
        run: |
          set -eo pipefail
          for f in supabase/migrations/*.sql; do
            echo "::group::Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done
      - name: Re-apply migrations to prove idempotency
        run: |
          set -eo pipefail
          for f in supabase/migrations/*.sql; do
            echo "::group::Re-applying $f (idempotency check)"
            psql -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done
      # Reproduces the cache-write upsert that broke translation caching
      # in prod (verified 2026-04-25). Specifically guards against a
      # UNIQUE that conflicts when two summaries differ only by
      # output_language — the exact shape this PR drops. Other conflict
      # shapes need their own fixture.
      #
      # Defense in depth: the assertion in the fixture uses RAISE
      # EXCEPTION (SQLSTATE P0001) which only fails psql when
      # ON_ERROR_STOP=1 is set. We additionally grep stdout for
      # "REGRESSION:" so the step also fails if someone ever drops the
      # flag, or if a future change uses RAISE WARNING by mistake.
      - name: Regression — translation cache upsert succeeds
        run: |
          set -eo pipefail
          output=$(psql -v ON_ERROR_STOP=1 -f supabase/test-fixtures/regression_translation_upsert.sql 2>&1)
          echo "$output"
          if echo "$output" | grep -q "REGRESSION:"; then
            echo "::error::Regression fixture detected a failure — see output above" >&2
            exit 1
          fi
