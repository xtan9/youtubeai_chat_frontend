name: Database Migration

# Chained off CI so a merge that breaks lint/test/build/typecheck cannot push
# its migration to prod. `workflow_dispatch` remains available for manual
# replays without waiting on CI.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    # Only run when CI passed on main, or when manually dispatched ON main.
    # workflow_dispatch on a feature branch would otherwise bypass CI.
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For workflow_run, check out the exact commit that CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect migration changes
        id: changes
        # pipefail + explicit failure so a missing HEAD~1 (shallow fetch /
        # history rewrite) never silently skips a real migration.
        run: |
          set -eo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "::error::HEAD~1 missing; cannot determine migration changes"
            exit 1
          fi
          changed_files=$(git diff --name-only HEAD~1 HEAD)
          if grep -q '^supabase/migrations/' <<<"$changed_files"; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.changes.outputs.migrations_changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.72.7

      - name: Link Supabase project
        if: steps.changes.outputs.migrations_changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref $PROJECT_ID

      - name: Run migrations
        if: steps.changes.outputs.migrations_changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push --include-all

      - name: Migration success
        if: steps.changes.outputs.migrations_changed == 'true'
        run: |
          echo "Database migrations applied successfully!"
